<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, collection, getDocs, query, orderBy, doc, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  // Same project config as index.html
  const firebaseConfig = {
    apiKey: "AIzaSyBB-d6GomYG30Yc0MzIMYU2rYz-EHtobC0",
    authDomain: "pisopoints-rewards.firebaseapp.com",
    projectId: "pisopoints-rewards",
    storageBucket: "pisopoints-rewards.firebasestorage.app",
    messagingSenderId: "338922845267",
    appId: "1:338922845267:web:58c13796cd3fdbe8bf02a6"
  };

  const app = initializeApp(firebaseConfig);
  const firestoreDb = getFirestore(app);
  window.__firebase = { firestoreDb, collection, getDocs, query, orderBy, doc, updateDoc };
</script>
<style>
  :root{
    --navy:#0B2545;
    --blue:#1360D9;
    --blue-dark:#0E4AAD;
    --blue-tint:#EAF2FE;
    --white:#FFFFFF;
    --gray:#6B7280;
    --gray-light:#E5E9F0;
    --green:#1F9D55;
    --green-tint:#E4F6EA;
    --red:#D64545;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:var(--blue-tint);
    color:var(--navy);
    min-height:100vh;
  }
  header{
    background:var(--white);
    border-bottom:1px solid var(--gray-light);
    padding:20px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  header h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px;
    font-weight:700;
    margin:0;
  }
  header p{
    font-size:12px;
    color:var(--gray);
    margin:2px 0 0;
  }
  .stats{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  .stat-card{
    background:var(--blue-tint);
    border-radius:12px;
    padding:10px 16px;
    text-align:center;
    min-width:100px;

  }
  .stat-card .label{
    font-size:11px;

  main{

    padding:24px 16px 60px;
  }
  .toolbar{
    display:flex;

    margin-bottom:16px;
    flex-wrap:wrap;
  }
  #search-input{
    flex:1;
    min-width:220px;
    height:44px;
    border-radius:12px;
    border:1.5px solid var(--gray-light);
    padding:0 14px;
    font-size:14px;

    outline:none;
  }
  #search-input:focus{border-color:var(--blue);}
  select#sort-select{

    border-radius:12px;
    border:1.5px solid var(--gray-light);
    padding:0 12px;
    font-size:14px;
    font-family:'Inter', sans-serif;
    background:var(--white);
  }
  .card-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .client-card{
    background:var(--white);
    border-radius:14px;
    border:1px solid var(--gray-light);
    overflow:hidden;
  }
  .client-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 18px;

    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .client-name{
    font-weight:600;
    font-size:14px;
  }
  .client-meta{
    font-size:12px;
    color:var(--gray);
  }
  .client-metrics{
    display:flex;
    gap:18px;
    align-items:center;
    flex-shrink:0;

    color:var(--navy);

    font-weight:600;

  }
  .report-sub{
    font-size:12px;
    color:var(--gray);
    margin:0 0 14px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    border-bottom:1px dashed var(--gray-light);

  }
  .barber-row:last-child{border-bottom:none;}
  .barber-rank{

    align-items:center;

    border-bottom:1px dashed var(--gray-light);
    font-size:13px;

  .freq-row:last-child{border-bottom:none;}
  .freq-name{font-weight:500;}

  .status-pill{
    font-size:11px;
    font-weight:600;
    padding:4px 10px;

  .report-tab.active{background:var(--blue); color:var(--white);}

  .freq-group.active{display:block;}

<body>

<header>
  <div>
    <h1>PisoPoints Admin</h1>
    <p>Client list, visit frequency, and barber history</p>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="stat-clients">–</div>
      <div class="label">Clients</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-visits">–</div>
      <div class="label">Total visits</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-points">–</div>
      <div class="label">Points issued</div>
    </div>
  </div>
</header>

<div id="repair-banner" style="display:none; max-width:1000px; margin:16px auto 0; padding:0 16px;">
  <div style="background:#FFF4E0; border:1px solid #F0D6A6; border-radius:12px; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
    <span style="font-size:13px; color:#B26A00;" id="repair-message"></span>
    <button id="btn-repair" style="width:auto; height:36px; padding:0 16px; font-size:13px; background:#B26A00; color:white; border-radius:8px; border:none; cursor:pointer;">Recalculate totals</button>
  </div>
</div>

<main>
  <div class="report-section">
    <p class="report-title">Barber performance</p>
    <p class="report-sub">Ranked by number of visits served</p>
    <div id="barber-report"></div>
  </div>

  <div class="report-section">
    <p class="report-title">Visit frequency & who's due</p>
    <p class="report-sub">Based on each client's average time between visits</p>
    <div class="report-tabs">
      <button class="report-tab active" data-group="due">Due / overdue</button>
      <button class="report-tab" data-group="ok">Not due yet</button>
      <button class="report-tab" data-group="none">Not enough data</button>
    </div>
    <div id="freq-report"></div>
  </div>

  <div class="toolbar">
    <input id="search-input" type="text" placeholder="Search by name or mobile number...">
    <select id="sort-select">
      <option value="recent">Sort: most recent visit</option>
      <option value="frequent">Sort: most visits</option>
      <option value="name">Sort: name (A-Z)</option>
      <option value="points">Sort: most points</option>
    </select>
  </div>
  <div id="list-container">
    <p class="loading-state">Loading clients...</p>
  </div>
</main>

<script>
var allClients = [];

function formatDate(timestamp){
  if(!timestamp) return "—";
  var d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  return d.toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" }) +
         " · " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

async function loadClients(){
  var fb = window.__firebase;
  var container = document.getElementById("list-container");
  try{
    var memberSnap = await fb.getDocs(fb.collection(fb.firestoreDb, "members"));
    var clients = [];
    var totalVisits = 0;
    var totalPoints = 0;

    for(var i = 0; i < memberSnap.docs.length; i++){
      var memberDoc = memberSnap.docs[i];
      var data = memberDoc.data();
      var visitsQuery = fb.query(
        fb.collection(fb.firestoreDb, "members", memberDoc.id, "visits"),
        fb.orderBy("visitedAt", "desc")
      );
      var visitsSnap = await fb.getDocs(visitsQuery);
      var visits = visitsSnap.docs.map(function(v){ return v.data(); });

      totalVisits += visits.length;
      totalPoints += (data.totalRewards || 0);

      clients.push({
        id: memberDoc.id,
        firstName: data.firstName || "",
        lastName: data.lastName || "",
        city: data.city || "",
        email: data.email || null,
        totalRewards: data.totalRewards || 0,
        visitCount: visits.length,
        lastVisit: visits.length ? visits[0].visitedAt : null,
        visits: visits
      });
    }

    allClients = clients;
    document.getElementById("stat-clients").textContent = clients.length.toLocaleString();
    document.getElementById("stat-visits").textContent = totalVisits.toLocaleString();
    document.getElementById("stat-points").textContent = totalPoints.toLocaleString();
    renderBarberReport(clients);
    renderFrequencyReport(clients);
    renderList();
    checkForMismatches(clients);
  } catch(e){
    console.error(e);
    container.innerHTML = "<p class='empty-state'>Couldn't load client data. Check your connection and Firestore rules.</p>";
  }
}

function renderList(){
  var container = document.getElementById("list-container");
  var searchTerm = document.getElementById("search-input").value.trim().toLowerCase();
  var sortMode = document.getElementById("sort-select").value;

  var filtered = allClients.filter(function(c){
    var fullName = (c.firstName + " " + c.lastName).toLowerCase();
    return fullName.indexOf(searchTerm) !== -1 || c.id.indexOf(searchTerm) !== -1;
  });

  filtered.sort(function(a, b){
    if(sortMode === "frequent") return b.visitCount - a.visitCount;
    if(sortMode === "name") return (a.firstName + a.lastName).localeCompare(b.firstName + b.lastName);
    if(sortMode === "points") return b.totalRewards - a.totalRewards;
    // recent
    var aTime = a.lastVisit ? (a.lastVisit.toDate ? a.lastVisit.toDate().getTime() : 0) : 0;
    var bTime = b.lastVisit ? (b.lastVisit.toDate ? b.lastVisit.toDate().getTime() : 0) : 0;
    return bTime - aTime;
  });

  if(filtered.length === 0){
    container.innerHTML = "<p class='empty-state'>No clients found.</p>";
    return;
  }

  container.innerHTML = "";
  var list = document.createElement("div");
  list.className = "card-list";

  filtered.forEach(function(client){
    var card = document.createElement("div");
    card.className = "client-card";

    var row = document.createElement("div");
    row.className = "client-row";
    row.innerHTML =
      "<div class='client-info'>" +
        "<div class='client-name'>" + client.firstName + " " + client.lastName + "</div>" +
        "<div class='client-meta'>" + client.id + (client.city ? " · " + client.city : "") + "</div>" +
      "</div>" +
      "<div class='client-metrics'>" +
        "<div class='metric'><div class='value'>" + client.visitCount + "</div><div class='label'>Visits</div></div>" +
        "<div class='metric'><div class='value'>" + client.totalRewards.toLocaleString() + "</div><div class='label'>Points</div></div>" +
        "<svg class='chevron' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>" +
      "</div>";

    row.addEventListener("click", function(){
      card.classList.toggle("expanded");
    });

    var history = document.createElement("div");
    history.className = "visit-history";
    if(client.visits.length === 0){
      history.innerHTML = "<p class='no-visits'>No visits recorded yet.</p>";
    } else {
      client.visits.forEach(function(v){
        var vRow = document.createElement("div");
        vRow.className = "visit-row";
        vRow.innerHTML =
          "<span class='visit-date'>" + formatDate(v.visitedAt) + "</span>" +
          "<span class='visit-barber'>" + (v.barber || "—") + "</span>" +
          "<span class='visit-amount'>PHP " + (v.amount || 0).toLocaleString() + "</span>" +
          "<span class='visit-points'>+" + (v.pointsEarned || 0).toLocaleString() + " pts</span>";
        history.appendChild(vRow);
      });
    }

    card.appendChild(row);
    card.appendChild(history);
    list.appendChild(card);
  });

  container.appendChild(list);
}

function getVisitDate(v){
  if(!v.visitedAt) return null;
  return v.visitedAt.toDate ? v.visitedAt.toDate() : new Date(v.visitedAt);
}

function renderBarberReport(clients){
  var barberMap = {};
  clients.forEach(function(c){
    c.visits.forEach(function(v){
      var name = v.barber || "Unspecified";
      if(!barberMap[name]) barberMap[name] = { visits: 0, clients: {} };
      barberMap[name].visits += 1;
      barberMap[name].clients[c.id] = true;
    });
  });

  var barbers = Object.keys(barberMap).map(function(name){
    return {
      name: name,
      visits: barberMap[name].visits,
      clientCount: Object.keys(barberMap[name].clients).length
    };
  });
  barbers.sort(function(a, b){ return b.visits - a.visits; });

  var container = document.getElementById("barber-report");
  if(barbers.length === 0){
    container.innerHTML = "<p class='no-visits'>No visits recorded yet — check back once purchases start coming in.</p>";
    return;
  }
  container.innerHTML = "";
  barbers.forEach(function(b, i){
    var row = document.createElement("div");
    row.className = "barber-row";
    row.innerHTML =
      "<div class='barber-rank'><span class='rank-badge'>" + (i+1) + "</span><span>" + b.name + "</span></div>" +
      "<div class='barber-stats'><span><b>" + b.visits + "</b> visits</span><span><b>" + b.clientCount + "</b> clients</span></div>";
    container.appendChild(row);
  });
}

// Minimum visits needed before we trust a frequency estimate
var MIN_VISITS_FOR_FREQUENCY = 2;

function computeFrequency(client){
  if(client.visits.length < MIN_VISITS_FOR_FREQUENCY){
    return { status: "none" };
  }
  // visits are stored most-recent-first
  var sorted = client.visits.slice().reverse(); // oldest -> newest
  var dates = sorted.map(getVisitDate).filter(Boolean);
  if(dates.length < MIN_VISITS_FOR_FREQUENCY){
    return { status: "none" };
  }
  var spanMs = dates[dates.length - 1].getTime() - dates[0].getTime();
  var avgIntervalDays = spanMs / (dates.length - 1) / 86400000;
  var avgWeeks = avgIntervalDays / 7;

  var lastVisit = dates[dates.length - 1];
  var nextExpected = new Date(lastVisit.getTime() + avgIntervalDays * 86400000);
  var daysUntilDue = Math.round((nextExpected.getTime() - Date.now()) / 86400000);

  var status = "ok";
  if(daysUntilDue < 0) status = "overdue";
  else if(daysUntilDue <= 7) status = "due";

  return {
    status: status,
    avgWeeks: avgWeeks,
    nextExpected: nextExpected,
    daysUntilDue: daysUntilDue,
    lowConfidence: dates.length === 2
  };
}

function renderFrequencyReport(clients){
  var groups = { due: [], ok: [], none: [] };

  clients.forEach(function(c){
    var freq = computeFrequency(c);
    if(freq.status === "overdue" || freq.status === "due"){
      groups.due.push({ client: c, freq: freq });
    } else if(freq.status === "ok"){
      groups.ok.push({ client: c, freq: freq });
    } else {
      groups.none.push({ client: c, freq: freq });
    }
  });

  groups.due.sort(function(a, b){ return a.freq.daysUntilDue - b.freq.daysUntilDue; });
  groups.ok.sort(function(a, b){ return a.freq.daysUntilDue - b.freq.daysUntilDue; });

  var container = document.getElementById("freq-report");
  container.innerHTML = "";

  ["due", "ok", "none"].forEach(function(groupKey){
    var groupDiv = document.createElement("div");
    groupDiv.className = "freq-group" + (groupKey === "due" ? " active" : "");
    groupDiv.id = "freq-group-" + groupKey;

    var items = groups[groupKey];
    if(items.length === 0){
      var emptyMsg = groupKey === "none"
        ? "Every client with data has enough visit history for an estimate."
        : "No clients in this category right now.";
      groupDiv.innerHTML = "<p class='no-visits'>" + emptyMsg + "</p>";
      container.appendChild(groupDiv);
      return;
    }

    items.forEach(function(item){
      var c = item.client;
      var freq = item.freq;
      var row = document.createElement("div");
      row.className = "freq-row";

      var pillClass = "status-" + freq.status;
      var pillText = "";
      var detailText = "";

      if(freq.status === "none"){
        pillClass = "status-none";
        pillText = "Need more data";
        detailText = client_needMoreDataText(c);
      } else {
        var weeksLabel = freq.avgWeeks < 1
          ? Math.round(freq.avgWeeks * 7) + "-day pattern"
          : freq.avgWeeks.toFixed(1) + "-week pattern";
        detailText = "Usually every " + weeksLabel + (freq.lowConfidence ? " (based on only 2 visits)" : "");

        if(freq.status === "overdue"){
          pillText = Math.abs(freq.daysUntilDue) + "d overdue";
        } else if(freq.status === "due"){
          pillText = freq.daysUntilDue === 0 ? "Due today" : "Due in " + freq.daysUntilDue + "d";
        } else {
          pillText = "Next in " + freq.daysUntilDue + "d";
        }
      }

      row.innerHTML =
        "<div><div class='freq-name'>" + c.firstName + " " + c.lastName + "</div>" +
        "<div class='freq-detail'>" + detailText + "</div></div>" +
        "<span class='status-pill " + pillClass + "'>" + pillText + "</span>";
      groupDiv.appendChild(row);
    });

    container.appendChild(groupDiv);
  });
}

function client_needMoreDataText(c){
  var count = c.visits.length;
  if(count === 0) return "No visits recorded yet";
  return "Only " + count + " visit" + (count > 1 ? "s" : "") + " recorded — need at least " + MIN_VISITS_FOR_FREQUENCY + " to estimate a pattern";
}

document.addEventListener("click", function(e){
  if(e.target.classList.contains("report-tab")){
    document.querySelectorAll(".report-tab").forEach(function(t){ t.classList.remove("active"); });
    document.querySelectorAll(".freq-group").forEach(function(g){ g.classList.remove("active"); });
    e.target.classList.add("active");
    document.getElementById("freq-group-" + e.target.dataset.group).classList.add("active");
  }
});

document.getElementById("search-input").addEventListener("input", renderList);
document.getElementById("sort-select").addEventListener("change", renderList);

function findMismatchedClients(clients){
  return clients.filter(function(c){
    var visitSum = c.visits.reduce(function(sum, v){ return sum + (v.pointsEarned || 0); }, 0);
    return visitSum !== c.totalRewards;
  });
}

function checkForMismatches(clients){
  var mismatched = findMismatchedClients(clients);
  var banner = document.getElementById("repair-banner");
  var message = document.getElementById("repair-message");
  if(mismatched.length === 0){
    banner.style.display = "none";
    return;
  }
  message.textContent = mismatched.length + " client" + (mismatched.length > 1 ? "s have" : " has") +
    " a points total that doesn't match their recorded visit history (likely from purchases saved before visit tracking was added). You can recalculate to fix this.";
  banner.style.display = "block";
}

document.getElementById("btn-repair").addEventListener("click", async function(){
  var fb = window.__firebase;
  var btn = this;
  var mismatched = findMismatchedClients(allClients);
  btn.disabled = true;
  btn.textContent = "Fixing...";
  try{
    for(var i = 0; i < mismatched.length; i++){
      var c = mismatched[i];
      var correctTotal = c.visits.reduce(function(sum, v){ return sum + (v.pointsEarned || 0); }, 0);
      var memberRef = fb.doc(fb.firestoreDb, "members", c.id);
      await fb.updateDoc(memberRef, { totalRewards: correctTotal });
    }
    document.getElementById("repair-banner").style.display = "none";
    await loadClients();
  } catch(e){
    console.error(e);
    btn.textContent = "Retry recalculate";
    btn.disabled = false;
    return;
  }
});

window.addEventListener("DOMContentLoaded", loadClients);
</script>

</body>
</html>
